services:
  eog-blog:
    image: ghcr.io/ernestofgaia/eog-blog:latest
    # For a local/VPS source build instead of the registry image, comment `image`
    # above and uncomment: build: .
    container_name: eog_blog
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - ADMIN_PASSWORD=${ADMIN_PASSWORD}
      - SESSION_SALT=${SESSION_SALT}
      - DATABASE_URL=/app/data/blog.db
      - SITE_URL=${SITE_URL:-https://ernestofgaia.xyz}
      - SITE_NAME=${SITE_NAME:-Ernest of Gaia}
      - CONTACT_SMS=${CONTACT_SMS:-503-664-0546}
      - CONTACT_EMAIL=${CONTACT_EMAIL:-eog@ernestofgaia.xyz}
      - PUBLISHING_AGENT_API_KEY=${PUBLISHING_AGENT_API_KEY}
      - CRON_API_KEY=${CRON_API_KEY}
    volumes:
      # SQLite DB persists here (design plan 04 §3.2). Named volume, snapshot-covered.
      - eog-blog-data:/app/data
    networks:
      # NPM adds a custom location  ernestofgaia.xyz/blog → eog_blog:3000
      - nginx-proxy

networks:
  nginx-proxy:
    external: true

volumes:
  eog-blog-data:
    name: eog-blog-data
